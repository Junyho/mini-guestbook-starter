spring:
  application:
    name: mini-guestbook

  # H2 인메모리 DB (설치 없이 쓰는 가벼운 연습용 DB)
  datasource:
    url: jdbc:h2:mem:guestbook
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true   # 실행되는 SQL을 콘솔로 확인 가능

  # http://localhost:8080/h2-console 로 DB를 직접 확인 (JDBC URL: jdbc:h2:mem:guestbook)
  h2:
    console:
      enabled: true
      path: /h2-console